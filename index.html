<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Valentine’s Day ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
  animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
  0%{background-position:left;}
  100%{background-position:right;}
}

.card{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.2);
  border-radius:25px;
  padding:40px;
  width:90%;
  max-width:650px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  position:relative;
  z-index:10;
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:3.5rem;
  color:#fff;
  margin-bottom:15px;
  text-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.typing{
  font-size:1.1rem;
  color:#fff;
  min-height:40px;
  margin-bottom:30px;
}

.images{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-bottom:30px;
}

.images img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #fff;
  box-shadow:0 0 25px rgba(255,255,255,0.8);
  transition:0.4s;
  animation:float 4s ease-in-out infinite;
}

.images img:hover{
  transform:scale(1.1);
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

button{
  padding:12px 35px;
  border:none;
  border-radius:50px;
  font-size:1rem;
  background:#ff4e7a;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:hover{
  transform:scale(1.1);
  background:#ff1f5a;
}

.hearts{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:1;
}

.heart{
  position:absolute;
  bottom:-50px;
  font-size:20px;
  animation:rise linear infinite;
}

@keyframes rise{
  to{
    transform:translateY(-110vh);
    opacity:0;
  }
}

.loveText{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:4rem;
  font-family:'Great Vibes',cursive;
  color:#fff;
  text-shadow:0 0 20px #ff4e7a;
  transition:0.6s;
  z-index:20;
}

.showLove{
  transform:translate(-50%,-50%) scale(1);
}

</style>
</head>
<body>

<div class="card">
  <h1>Happy Valentine’s Day ❤️</h1>

  <div class="typing" id="typingText"></div>

  <div class="images">
    <img src="1.jpg" alt="Me">
    <img src="2.jpg" alt="You">
  </div>

  <button onclick="showLove()">Send Love 💖</button>
</div>

<div class="hearts" id="hearts"></div>
<div class="loveText" id="loveText">️😘</div>

<script>

// Typing Effect
const text = "You are my today and all of my tomorrows. I love you endlessly ❤️";
let i = 0;
function typeWriter(){
  if(i < text.length){
    document.getElementById("typingText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter,50);
  }
}
typeWriter();

// Floating background hearts
function createHeart(){
  const heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*5)+"s";
  heart.style.fontSize=(15+Math.random()*25)+"px";
  document.getElementById("hearts").appendChild(heart);
  setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart,400);

// Button Click Love Explosion
function showLove(){
  document.getElementById("loveText").classList.add("showLove");

  for(let j=0;j<30;j++){
    createHeart();
  }
}

</script>

</body>
</html>
